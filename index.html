<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volleyball Training</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07080a; font-family: Georgia, serif; }

<body>

  <div id="nav">
    <button class="active" onclick="showApp('spike', this)">⚡ Spike Power</button>
    <button onclick="showApp('vert', this)">📈 Vert Pro</button>
  </div>

  <div id="root-spike"></div>
  <div id="root-vert"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── easing & math ─────────────────────────────────────────────────
const lerp=(a,b,t)=>a+(b-a)*t;
const lp=(a,b,t)=>({x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)});
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const sat=(v)=>clamp(v,0,1);
const easeInOut=t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
const easeOut=t=>1-Math.pow(1-t,3);
const easeOut4=t=>1-Math.pow(1-t,4);
const easeIn=t=>t*t*t;
const easeIn2=t=>t*t;
const smoothstep=t=>t*t*(3-2*t);
const smootherstep=t=>t*t*t*(t*(t*6-15)+10);
const lerpPose=(a,b,t)=>{const o={};for(const k in a)o[k]=lp(a[k],b[k],t);return o;};
const ang=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
const rot=(p,cx,cy,a)=>({x:cx+(p.x-cx)*Math.cos(a)-(p.y-cy)*Math.sin(a),y:cy+(p.x-cx)*Math.sin(a)+(p.y-cy)*Math.cos(a)});

const SKIN='#c8956c';
const SKIN_D='#a06b40';
const SKIN_S='#e8b48a';
const SHIRT='#2a4a7f';
const SHIRT_D='#1a2f50';
const SHIRT_H='#3a6aaf';
const SHORTS='#1a1a2e';
const SHORTS_D='#0a0a1a';
const SHOE='#e8e0d0';
const SHOE_D='#c8b89a';
const HAIR='#1a0a00';

function drawBody(ctx, p, opts={}) {
  const c = ctx;
  c.save();
  c.lineCap='round'; c.lineJoin='round';
  const fill=(col,stroke,sw=1)=>{c.fillStyle=col;if(stroke){c.strokeStyle=stroke;c.lineWidth=sw;}};
  const seg=(x1,y1,x2,y2,w,col,scol)=>{
    const a=ang({x:x1,y:y1},{x:x2,y:y2});
    const p2=a+Math.PI/2;
    const w1=w, w2=w*.65;
    c.beginPath();
    c.moveTo(x1+Math.cos(p2)*w1, y1+Math.sin(p2)*w1);
    c.quadraticCurveTo((x1+x2)/2+Math.cos(p2)*((w1+w2)/2)*1.1,(y1+y2)/2+Math.sin(p2)*((w1+w2)/2)*1.1,x2+Math.cos(p2)*w2, y2+Math.sin(p2)*w2);
    c.lineTo(x2-Math.cos(p2)*w2, y2-Math.sin(p2)*w2);
    c.quadraticCurveTo((x1+x2)/2-Math.cos(p2)*((w1+w2)/2)*1.1,(y1+y2)/2-Math.sin(p2)*((w1+w2)/2)*1.1,x1-Math.cos(p2)*w1, y1-Math.sin(p2)*w1);
    c.closePath();
    c.fillStyle=col; c.fill();
    if(scol){c.strokeStyle=scol;c.lineWidth=.6;c.stroke();}
  };
  const oval=(cx,cy,rx,ry,a,col,scol,sw=.6)=>{
    c.beginPath();c.ellipse(cx,cy,rx,ry,a,0,Math.PI*2);
    c.fillStyle=col;c.fill();
    if(scol){c.strokeStyle=scol;c.lineWidth=sw;c.stroke();}
  };
  const {sho,hips,neck,head,eL,eR,hL,hR,kL,kR,fL,fR}=p;
  const torsoW=12, hipW=10;
  const td=ang(sho,hips);
  const tp=td+Math.PI/2;
  c.beginPath();
  c.moveTo(sho.x+Math.cos(tp)*torsoW, sho.y+Math.sin(tp)*torsoW);
  c.bezierCurveTo(sho.x+Math.cos(tp)*torsoW+Math.cos(td)*8, sho.y+Math.sin(tp)*torsoW+Math.sin(td)*8,hips.x+Math.cos(tp)*hipW+Math.cos(td)*(-4), hips.y+Math.sin(tp)*hipW+Math.sin(td)*(-4),hips.x+Math.cos(tp)*hipW, hips.y+Math.sin(tp)*hipW);
  c.lineTo(hips.x-Math.cos(tp)*hipW, hips.y-Math.sin(tp)*hipW);
  c.bezierCurveTo(hips.x-Math.cos(tp)*hipW+Math.cos(td)*(-4), hips.y-Math.sin(tp)*hipW+Math.sin(td)*(-4),sho.x-Math.cos(tp)*torsoW+Math.cos(td)*8, sho.y-Math.sin(tp)*torsoW+Math.sin(td)*8,sho.x-Math.cos(tp)*torsoW, sho.y-Math.sin(tp)*torsoW);
  c.closePath();
  c.fillStyle=SHIRT; c.fill();
  c.strokeStyle=SHIRT_D; c.lineWidth=.8; c.stroke();
  c.globalAlpha=.18;
  c.beginPath();
  c.moveTo(sho.x+Math.cos(tp)*4, sho.y+Math.sin(tp)*4);
  c.lineTo(sho.x+Math.cos(tp)*2+Math.cos(td)*6, sho.y+Math.sin(tp)*2+Math.sin(td)*6);
  c.lineWidth=3; c.strokeStyle=SHIRT_H; c.stroke();
  c.globalAlpha=1;
  oval(lerp(neck.x,head.x,.3), lerp(neck.y,head.y,.3), 4, 6, ang(neck,head), SKIN, SKIN_D);
  seg(hips.x-4, hips.y, kL.x, kL.y, 7.5, SHORTS, SHORTS_D);
  seg(hips.x+4, hips.y, kR.x, kR.y, 7.5, SHORTS, SHORTS_D);
  seg(kL.x, kL.y, fL.x, fL.y-4, 5.5, SKIN, SKIN_D);
  seg(kR.x, kR.y, fR.x, fR.y-4, 5.5, SKIN, SKIN_D);
  oval(kL.x, kL.y, 5, 4.5, ang(hips,kL), SKIN_S, SKIN_D, .5);
  oval(kR.x, kR.y, 5, 4.5, ang(hips,kR), SKIN_S, SKIN_D, .5);
  const drawShoe=(kx,ky,fx,fy,side)=>{
    const a=ang({x:kx,y:ky},{x:fx,y:fy});
    c.beginPath();
    c.ellipse(fx+Math.cos(a)*4, fy+2, 9, 3.5, a*.3, 0, Math.PI*2);
    c.fillStyle=SHOE_D; c.fill();
    c.beginPath();
    c.moveTo(fx-Math.cos(a+Math.PI/2)*4, fy-Math.sin(a+Math.PI/2)*4);
    c.lineTo(fx+Math.cos(a)*10, fy+Math.sin(a)*5-1);
    c.lineTo(fx+Math.cos(a)*10+Math.cos(a+Math.PI/2)*3, fy+Math.sin(a)*5+Math.sin(a+Math.PI/2)*3-1);
    c.lineTo(fx+Math.cos(a+Math.PI/2)*3, fy+Math.sin(a+Math.PI/2)*3);
    c.closePath();
    c.fillStyle=SHOE; c.fill(); c.strokeStyle=SHOE_D; c.lineWidth=.6; c.stroke();
    c.globalAlpha=.35; c.strokeStyle='#888'; c.lineWidth=.5;
    for(let i=0;i<2;i++){const lx=fx+Math.cos(a)*(3+i*3.5);const ly=fy+Math.sin(a)*(2+i*1.5);c.beginPath(); c.moveTo(lx-2,ly-2); c.lineTo(lx+2,ly-2); c.stroke();}
    c.globalAlpha=1;
  };
  drawShoe(kL.x,kL.y,fL.x,fL.y,0);
  drawShoe(kR.x,kR.y,fR.x,fR.y,1);
  seg(sho.x-10, sho.y, eL.x, eL.y, 5, SHIRT, SHIRT_D);
  seg(sho.x+10, sho.y, eR.x, eR.y, 5, SHIRT, SHIRT_D);
  oval(sho.x-10, sho.y, 7, 6, ang(sho,eL), SHIRT_H, SHIRT_D, .7);
  oval(sho.x+10, sho.y, 7, 6, ang(sho,eR), SHIRT_H, SHIRT_D, .7);
  seg(eL.x, eL.y, hL.x, hL.y, 4, SKIN, SKIN_D);
  seg(eR.x, eR.y, hR.x, hR.y, 4, SKIN, SKIN_D);
  oval(eL.x, eL.y, 4, 3.5, ang(sho,eL), SKIN_S, SKIN_D, .5);
  oval(eR.x, eR.y, 4, 3.5, ang(sho,eR), SKIN_S, SKIN_D, .5);
  oval(hL.x, hL.y, 4, 3, ang(eL,hL), SKIN, SKIN_D, .6);
  oval(hR.x, hR.y, 4, 3, ang(eR,hR), SKIN, SKIN_D, .6);
  oval(head.x, head.y, 10, 11, 0, SKIN, SKIN_D, .8);
  c.beginPath();
  c.ellipse(head.x, head.y-5, 10, 8, 0, Math.PI, Math.PI*2);
  c.fillStyle=HAIR; c.fill();
  c.globalAlpha=.6;
  c.beginPath(); c.ellipse(head.x+2, head.y-4, 8, 5, -.2, Math.PI, Math.PI*2);
  c.fillStyle=HAIR; c.fill(); c.globalAlpha=1;
  oval(head.x+9, head.y+1, 2.5, 3, 0, SKIN, SKIN_D, .5);
  oval(head.x+4, head.y+1, 2.5, 2, 0, '#fff', '#999', .4);
  c.beginPath(); c.arc(head.x+4.5, head.y+1, 1.3, 0, Math.PI*2);
  c.fillStyle='#2a1a0a'; c.fill();
  c.beginPath(); c.moveTo(head.x+2, head.y-2); c.lineTo(head.x+7, head.y-2.5);
  c.strokeStyle=HAIR; c.lineWidth=1; c.stroke();
  c.beginPath(); c.moveTo(head.x+6, head.y+1); c.quadraticCurveTo(head.x+8, head.y+3, head.x+6, head.y+4);
  c.strokeStyle=SKIN_D; c.lineWidth=.8; c.stroke();
  c.beginPath(); c.arc(head.x+5, head.y+6, 2, -.1, Math.PI+.1);
  c.strokeStyle=SKIN_D; c.lineWidth=.7; c.stroke();
  c.globalAlpha=.08;
  c.fillStyle='#fff';
  c.beginPath(); c.ellipse((fL.x+fR.x)/2, Math.max(fL.y,fR.y)+4, 16, 4, 0, 0, Math.PI*2); c.fill();
  c.globalAlpha=1;
  c.restore();
}

const pose=(cx,gY,cr=0,o={})=>{
  const hy=gY-52+cr*22, ky=gY-26+cr*12, sy=hy-24;
  return{head:{x:cx+(o.hx||0), y:sy-22},neck:{x:cx, y:sy-6},sho:{x:cx, y:sy+2},hips:{x:cx, y:hy},kL:{x:cx-8+(o.kLx||0), y:ky+(o.kLy||0)},kR:{x:cx+8+(o.kRx||0), y:ky+(o.kRy||0)},fL:{x:cx-10+(o.fLx||0), y:gY+(o.fLy||0)},fR:{x:cx+10+(o.fRx||0), y:gY+(o.fRy||0)},eL:{x:cx-18+(o.eLx||0), y:sy+16+(o.eLy||0)},eR:{x:cx+18+(o.eRx||0), y:sy+16+(o.eRy||0)},hL:{x:cx-14+(o.hLx||0), y:sy+32+(o.hLy||0)},hR:{x:cx+14+(o.hRx||0), y:sy+32+(o.hRy||0)}};
};
const airP=(cx,topY,up=false)=>{
  const sy=topY+8;
  return{head:{x:cx, y:topY-4},neck:{x:cx, y:topY+8},sho:{x:cx, y:sy+4},hips:{x:cx, y:sy+28},kL:{x:cx-12, y:sy+46},kR:{x:cx+12, y:sy+46},fL:{x:cx-10, y:sy+62},fR:{x:cx+10, y:sy+62},eL:up?{x:cx-22,y:sy-6}:{x:cx-22,y:sy+20},eR:up?{x:cx+22,y:sy-6}:{x:cx+22,y:sy+20},hL:up?{x:cx-16,y:topY-18}:{x:cx-26,y:sy+34},hR:up?{x:cx+16,y:topY-18}:{x:cx+26,y:sy+34}};
};

const barbell=(ctx,cx,y)=>{
  ctx.strokeStyle='#777'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-44,y); ctx.lineTo(cx+44,y); ctx.stroke();
  [[-44,-30],[30,44]].forEach(([a,b])=>{ctx.fillStyle='#444'; ctx.fillRect(cx+a,y-7,b-a,14);ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(cx+a,y-7,b-a,14);});
};
const gnd=(ctx,gY,W,col)=>{
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gY); ctx.lineTo(W,gY); ctx.stroke();
  ctx.globalAlpha=.03; ctx.strokeStyle=col; ctx.lineWidth=.5;
  for(let x=0;x<W;x+=14){ctx.beginPath();ctx.moveTo(x,gY);ctx.lineTo(x,gY+2);ctx.stroke();}
  ctx.globalAlpha=1;
};
const box=(ctx,x,y,w,h)=>{
  ctx.fillStyle='#1e1e1e'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=1.5; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#252525';
  for(let i=1;i<3;i++){ctx.fillRect(x,y+h*i/3,w,1);}
};
const net=(ctx,nx,topY,gY,col)=>{
  ctx.strokeStyle='#282828'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(nx,topY); ctx.lineTo(nx,gY); ctx.stroke();
  ctx.strokeStyle='#222'; ctx.lineWidth=.7;
  for(let y=topY+6;y<gY;y+=8){ctx.beginPath();ctx.moveTo(nx-4,y);ctx.lineTo(nx,y);ctx.stroke();}
  ctx.strokeStyle=col+'44'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(nx-5,topY); ctx.lineTo(nx+2,topY); ctx.stroke();
};
const vball=(ctx,x,y,r,a)=>{
  ctx.globalAlpha=a;
  ctx.fillStyle='#ddd'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=.8; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#888'; ctx.lineWidth=.6;
  ctx.beginPath(); ctx.moveTo(x-r,y); ctx.quadraticCurveTo(x,y-r*.5,x+r,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-r*.5,y-r*.85); ctx.quadraticCurveTo(x+r*.6,y,x-r*.5,y+r*.85); ctx.stroke();
  ctx.globalAlpha=1;
};

const jumpShadow=(ctx,cx,gY,bodyY,maxH)=>{
  const frac=sat((gY-bodyY)/maxH);
  ctx.globalAlpha=lerp(.18,.02,frac);
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.ellipse(cx,gY+3,lerp(16,5,frac),3.5,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
};
const ripple=(ctx,cx,gY,age,col)=>{
  ctx.globalAlpha=sat(1-age)*.35; ctx.strokeStyle=col; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(cx,gY,age*26,Math.PI,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1;
};
const speedLines=(ctx,cx,gY,speed,col)=>{
  ctx.globalAlpha=speed*.18; ctx.strokeStyle=col; ctx.lineWidth=.8;
  for(let i=0;i<3;i++){const yo=i*13; ctx.beginPath(); ctx.moveTo(cx-30-i*5,gY-36-yo); ctx.lineTo(cx-18-i*5,gY-36-yo); ctx.stroke();}
  ctx.globalAlpha=1;
};

const EXERCISES={
  "Depth Jumps":{
    muscles:['quad','calf','glute','hamstring'],
    howTo:[
      {step:'Setup', desc:'Stand on a box 12–18 inches high. Step (don\'t jump) off the edge.'},
      {step:'Land', desc:'Hit the ground with both feet simultaneously, absorbing with soft ankles, knees, and hips.'},
      {step:'React', desc:'Immediately explode upward as fast as possible — minimize ground contact time.'},
      {step:'Arms', desc:'Drive both arms up aggressively to add 2–3 inches to your jump height.'},
      {step:'Reset', desc:'Land softly, walk back to the box, and rest 30–60 seconds between reps.'},
    ],
    fn:(ctx,t,col)=>{
      const W=140,H=180,gY=152,cx=76;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
      box(ctx,12,gY-24,52,24); gnd(ctx,gY,W,col);
      let p;
      if(t<.10){p=pose(38,gY-24,.05,{hx:1});}
      else if(t<.22){const v=easeIn2((t-.10)/.12);p=lerpPose(pose(38,gY-24),pose(cx,gY,.2,{eLy:8,eRy:8,hLy:14,hRy:14}),easeOut(v));}
      else if(t<.38){const v=smootherstep(sat((t-.22)/.16));const cr=lerp(.1,.92,Math.sin(v*Math.PI));const dl=Math.sin(v*Math.PI);p=pose(cx,gY,cr,{eLy:dl*12,eRy:dl*12,hLy:dl*20,hRy:dl*20,hLx:-5,hRx:5});if(v<.55) ripple(ctx,cx,gY,v*.6,col);}
      else if(t<.54){const v=easeOut4(sat((t-.38)/.16));const cr=lerp(.85,0,v);p=pose(cx,gY,cr,{eLy:lerp(14,-44,v),eRy:lerp(14,-44,v),hLy:lerp(22,-62,v),hRy:lerp(22,-62,v),hLx:-6,hRx:6});ctx.globalAlpha=sat(1-v)*.25; ctx.strokeStyle=col; ctx.lineWidth=1;ctx.beginPath(); ctx.arc(cx,gY,v*22,Math.PI,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;}
      else if(t<.80){const v=(t-.54)/.26;const peakH=92, yOff=peakH*4*v*(1-v), bodyY=gY-yOff;jumpShadow(ctx,cx,gY,bodyY,peakH);const tuck=Math.sin(v*Math.PI)*.3;const ap=airP(cx,bodyY-30,true);p={...ap,eL:{x:cx-20,y:ap.sho.y+lerp(-4,14,v*.8)},eR:{x:cx+20,y:ap.sho.y+lerp(-4,14,v*.8)},hL:{x:cx-14,y:ap.sho.y+lerp(-16,8,v*.8)},hR:{x:cx+14,y:ap.sho.y+lerp(-16,8,v*.8)},kL:{x:cx-11-tuck*3,y:ap.kL.y-tuck*10},kR:{x:cx+11+tuck*3,y:ap.kR.y-tuck*10},fL:{x:cx-9,y:ap.fL.y-tuck*16},fR:{x:cx+9,y:ap.fR.y-tuck*16}};if(v>.3&&v<.7){const fade=sat(1-Math.abs(v-.5)/.2);ctx.globalAlpha=fade*.65; ctx.strokeStyle=col; ctx.lineWidth=.8; ctx.setLineDash([2,4]);ctx.beginPath(); ctx.moveTo(cx+30,bodyY-26); ctx.lineTo(cx+30,gY); ctx.stroke();ctx.setLineDash([]); ctx.fillStyle=col; ctx.font='bold 7px monospace';ctx.fillText(Math.round(yOff*.88)+'"',cx+33,bodyY-20); ctx.globalAlpha=1;}}
      else{const v=smootherstep(sat((t-.80)/.20));const ap=airP(cx,gY-18,true); const lp2=pose(cx,gY,.28);p=lerpPose(ap,lp2,easeOut4(v));if(v>.7) ripple(ctx,cx,gY,(v-.7)/.3,col);jumpShadow(ctx,cx,gY,gY-18*(1-v),80);}
      drawBody(ctx,p);
    }
  },
  "Box Jumps":{
    muscles:['quad','glute','calf'],
    howTo:[
      {step:'Start Position', desc:'Stand about 1 foot away from the box with feet hip-width apart.'},
      {step:'Load', desc:'Hinge at your hips and bend your knees into a quarter squat, swinging arms back.'},
      {step:'Explode', desc:'Drive your arms forward and up while pushing through both feet to launch onto the box.'},
      {step:'Land Soft', desc:'Land with both feet simultaneously in a soft quarter squat — never land stiff-legged.'},
      {step:'Step Down', desc:'Always step down (don\'t jump down) to save your joints for the next rep.'},
    ],
    fn:(ctx,t,col)=>{
      const W=140,H=180,gY=152,startX=32,boxX=102,boxTop=gY-36;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
      box(ctx,72,boxTop,60,36); gnd(ctx,gY,W,col);

      const W=140,H=180,cx=70,gY=152;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
      gnd(ctx,gY,W,col);
      const rot=Math.sin(t*Math.PI*2), p=pose(cx,gY);
      const ex=cx+24, ey=p.sho.y+16, fa=-0.35+rot*1.15;
      const hx=ex+Math.cos(fa)*24, hy2=ey+Math.sin(fa)*24;
      ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,ey); ctx.lineTo(cx-24,ey); ctx.stroke();
      ctx.shadowColor='#00FFFF'; ctx.shadowBlur=5; ctx.strokeStyle='#00FFFF77'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.moveTo(cx-24,ey); ctx.lineTo(hx,hy2); ctx.stroke(); ctx.shadowBlur=0;
      ctx.strokeStyle='#00FFFF14'; ctx.lineWidth=10; ctx.beginPath(); ctx.arc(ex,ey,24,-1.6,.9); ctx.stroke();
      drawBody(ctx,{...p,eR:{x:ex,y:ey},hR:{x:hx,y:hy2}});
    }
  },
};

function AnimCanvas({exercise,color}){
  const ref=useRef(null), fr=useRef(0), raf=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const ex=EXERCISES[exercise];
    const loop=()=>{ex?.fn(ctx,(fr.current%180)/180,color);fr.current++;raf.current=requestAnimationFrame(loop);};
    fr.current=0; raf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf.current);
  },[exercise,color]);
  return React.createElement('canvas',{ref,width:140,height:180,style:{display:'block',borderRadius:'3px'}});
}

const C = {
  bg: '#07080a',
  surface: '#0d0f12',
  border: '#1a1d22',

// ── Canvas drawing helpers ─────────────────────────────────────────
const SP_SKIN='#c8956c', SP_SKIN_D='#a06b40', SP_SKIN_S='#e8b48a';
const SP_SHIRT='#1a1a2e', SP_SHIRT_D='#0d0d1a', SP_SHIRT_H='#2a2a4e';
const SP_SHORTS='#0f1218', SP_SHOE='#e8e0d0', SP_SHOE_D='#c8b89a', SP_HAIR='#1a0a00';

function drawAthlete(ctx, p) {
  const c = ctx;
  c.save(); c.lineCap='round'; c.lineJoin='round';

  const seg=(x1,y1,x2,y2,w,col,scol)=>{
    const a=Math.atan2(y2-y1,x2-x1), p2=a+Math.PI/2, w1=w, w2=w*.65;
    c.beginPath();
    c.moveTo(x1+Math.cos(p2)*w1,y1+Math.sin(p2)*w1);
    c.quadraticCurveTo((x1+x2)/2+Math.cos(p2)*((w1+w2)/2)*1.1,(y1+y2)/2+Math.sin(p2)*((w1+w2)/2)*1.1,x2+Math.cos(p2)*w2,y2+Math.sin(p2)*w2);
    c.lineTo(x2-Math.cos(p2)*w2,y2-Math.sin(p2)*w2);
    c.quadraticCurveTo((x1+x2)/2-Math.cos(p2)*((w1+w2)/2)*1.1,(y1+y2)/2-Math.sin(p2)*((w1+w2)/2)*1.1,x1-Math.cos(p2)*w1,y1-Math.sin(p2)*w1);
    c.closePath(); c.fillStyle=col; c.fill();
    if(scol){c.strokeStyle=scol;c.lineWidth=.6;c.stroke();}
  };
  const oval=(cx,cy,rx,ry,a,col,scol,sw=.6)=>{
    c.beginPath();c.ellipse(cx,cy,rx,ry,a,0,Math.PI*2);
    c.fillStyle=col;c.fill();
    if(scol){c.strokeStyle=scol;c.lineWidth=sw;c.stroke();}
  };

  const {sho,hips,neck,head,eL,eR,hL,hR,kL,kR,fL,fR}=p;
  const td=Math.atan2(hips.y-sho.y,hips.x-sho.x), tp=td+Math.PI/2;
  const tW=11, hW=9;

  // torso
  c.beginPath();
  c.moveTo(sho.x+Math.cos(tp)*tW,sho.y+Math.sin(tp)*tW);
  c.bezierCurveTo(sho.x+Math.cos(tp)*tW+Math.cos(td)*7,sho.y+Math.sin(tp)*tW+Math.sin(td)*7,hips.x+Math.cos(tp)*hW+Math.cos(td)*(-3),hips.y+Math.sin(tp)*hW+Math.sin(td)*(-3),hips.x+Math.cos(tp)*hW,hips.y+Math.sin(tp)*hW);
  c.lineTo(hips.x-Math.cos(tp)*hW,hips.y-Math.sin(tp)*hW);
  c.bezierCurveTo(hips.x-Math.cos(tp)*hW+Math.cos(td)*(-3),hips.y-Math.sin(tp)*hW+Math.sin(td)*(-3),sho.x-Math.cos(tp)*tW+Math.cos(td)*7,sho.y-Math.sin(tp)*tW+Math.sin(td)*7,sho.x-Math.cos(tp)*tW,sho.y-Math.sin(tp)*tW);
  c.closePath(); c.fillStyle=SP_SHIRT; c.fill(); c.strokeStyle=SP_SHIRT_D; c.lineWidth=.7; c.stroke();

  // neck, legs, arms
  oval(lerp(neck.x,head.x,.3),lerp(neck.y,head.y,.3),4,6,Math.atan2(head.y-neck.y,head.x-neck.x),SP_SKIN,SP_SKIN_D);
  seg(hips.x-4,hips.y,kL.x,kL.y,7,SP_SHORTS,SP_SKIN_D);
  seg(hips.x+4,hips.y,kR.x,kR.y,7,SP_SHORTS,SP_SKIN_D);
  seg(kL.x,kL.y,fL.x,fL.y-3,5,SP_SKIN,SP_SKIN_D);
  seg(kR.x,kR.y,fR.x,fR.y-3,5,SP_SKIN,SP_SKIN_D);
  oval(kL.x,kL.y,4.5,4,Math.atan2(kL.y-hips.y,kL.x-hips.x),SP_SKIN_S,SP_SKIN_D,.5);
  oval(kR.x,kR.y,4.5,4,Math.atan2(kR.y-hips.y,kR.x-hips.x),SP_SKIN_S,SP_SKIN_D,.5);

  // shoes
  const shoe=(kx,ky,fx,fy)=>{
    const a=Math.atan2(fy-ky,fx-kx);
    c.beginPath();c.ellipse(fx+Math.cos(a)*4,fy+2,8,3,a*.3,0,Math.PI*2);c.fillStyle=SP_SHOE_D;c.fill();
    c.beginPath();
    c.moveTo(fx-Math.cos(a+Math.PI/2)*3.5,fy-Math.sin(a+Math.PI/2)*3.5);
    c.lineTo(fx+Math.cos(a)*9,fy+Math.sin(a)*4.5-1);
    c.lineTo(fx+Math.cos(a)*9+Math.cos(a+Math.PI/2)*2.5,fy+Math.sin(a)*4.5+Math.sin(a+Math.PI/2)*2.5-1);
    c.lineTo(fx+Math.cos(a+Math.PI/2)*2.5,fy+Math.sin(a+Math.PI/2)*2.5);
    c.closePath();c.fillStyle=SP_SHOE;c.fill();c.strokeStyle=SP_SHOE_D;c.lineWidth=.6;c.stroke();
  };
  shoe(kL.x,kL.y,fL.x,fL.y); shoe(kR.x,kR.y,fR.x,fR.y);

  seg(sho.x-9,sho.y,eL.x,eL.y,5,SP_SHIRT,SP_SHIRT_D);
  seg(sho.x+9,sho.y,eR.x,eR.y,5,SP_SHIRT,SP_SHIRT_D);
  oval(sho.x-9,sho.y,6.5,5.5,Math.atan2(eL.y-sho.y,eL.x-sho.x),SP_SHIRT_H,SP_SHIRT_D,.6);
  oval(sho.x+9,sho.y,6.5,5.5,Math.atan2(eR.y-sho.y,eR.x-sho.x),SP_SHIRT_H,SP_SHIRT_D,.6);
  seg(eL.x,eL.y,hL.x,hL.y,3.5,SP_SKIN,SP_SKIN_D);
  seg(eR.x,eR.y,hR.x,hR.y,3.5,SP_SKIN,SP_SKIN_D);
  oval(eL.x,eL.y,3.5,3,Math.atan2(eL.y-sho.y,eL.x-sho.x),SP_SKIN_S,SP_SKIN_D,.5);
  oval(eR.x,eR.y,3.5,3,Math.atan2(eR.y-sho.y,eR.x-sho.x),SP_SKIN_S,SP_SKIN_D,.5);
  oval(hL.x,hL.y,3.5,2.5,Math.atan2(hL.y-eL.y,hL.x-eL.x),SP_SKIN,SP_SKIN_D,.5);
  oval(hR.x,hR.y,3.5,2.5,Math.atan2(hR.y-eR.y,hR.x-eR.x),SP_SKIN,SP_SKIN_D,.5);

  // head
  oval(head.x,head.y,9.5,10.5,0,SP_SKIN,SP_SKIN_D,.7);
  c.beginPath();c.ellipse(head.x,head.y-4.5,9.5,7.5,0,Math.PI,Math.PI*2);c.fillStyle=SP_HAIR;c.fill();
  c.globalAlpha=.55;c.beginPath();c.ellipse(head.x+2,head.y-3.5,7.5,4.5,-.2,Math.PI,Math.PI*2);c.fillStyle=SP_HAIR;c.fill();c.globalAlpha=1;
  oval(head.x+8.5,head.y+1,2.3,2.8,0,SP_SKIN,SP_SKIN_D,.4);
  oval(head.x+3.5,head.y+1,2.3,1.8,0,'#fff','#999',.3);
  c.beginPath();c.arc(head.x+4,head.y+1,1.2,0,Math.PI*2);c.fillStyle='#2a1a0a';c.fill();
  c.beginPath();c.moveTo(head.x+1.5,head.y-2);c.lineTo(head.x+6.5,head.y-2.5);c.strokeStyle=SP_HAIR;c.lineWidth=.9;c.stroke();
  c.beginPath();c.moveTo(head.x+5.5,head.y+1);c.quadraticCurveTo(head.x+7.5,head.y+3,head.x+5.5,head.y+3.5);c.strokeStyle=SP_SKIN_D;c.lineWidth=.7;c.stroke();
  c.beginPath();c.arc(head.x+4.5,head.y+5.5,1.8,-.1,Math.PI+.1);c.strokeStyle=SP_SKIN_D;c.lineWidth=.6;c.stroke();

  c.globalAlpha=.07;c.fillStyle='#ccc';
  c.beginPath();c.ellipse((fL.x+fR.x)/2,Math.max(fL.y,fR.y)+4,15,3.5,0,0,Math.PI*2);c.fill();
  c.globalAlpha=1;
  c.restore();
}

const lerpP=(a,b,t)=>{const o={};for(const k in a)o[k]={x:lerp(a[k].x,b[k].x,t),y:lerp(a[k].y,b[k].y,t)};return o;};

function drawBall(ctx,x,y,r,glow,col='#ddd'){
  if(glow>0){
    const g=ctx.createRadialGradient(x,y,0,x,y,r*3);
    g.addColorStop(0,`rgba(255,180,0,${glow*.5})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*3,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aaa';ctx.lineWidth=.7;ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=.55;
  ctx.beginPath();ctx.moveTo(x-r,y);ctx.quadraticCurveTo(x,y-r*.45,x+r,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-r*.45,y-r*.8);ctx.quadraticCurveTo(x+r*.55,y,x-r*.45,y+r*.8);ctx.stroke();
}

        sho:{x:cx,y:sy},hips:{x:cx,y:by},
        kL:{x:cx-11,y:by+22},kR:{x:cx+11,y:by+20},
        fL:{x:cx-10,y:airY+lerp(20,0,hit)},fR:{x:cx+10,y:airY+lerp(22,2,hit)},
        eL:{x:cx-18,y:sy+16},
        eR:{x:bx-18,y:sy-10},
        hL:{x:cx-14,y:sy+30},
        hR:{x:bx,y:ballY},
      };
      drawBall(ctx,bx,ballY,9,hit>.75?(hit-.75)/.25*1.2:0);
      drawAthlete(ctx,p);
      // "CONTACT ZONE" label
      ctx.globalAlpha=.4;ctx.strokeStyle=col;ctx.lineWidth=.7;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(cx+22,sy-30);ctx.lineTo(bx+12,sy-30);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;
      ctx.fillStyle=col;ctx.font='7px monospace';ctx.globalAlpha=.55;
      ctx.fillText('CONTACT ZONE',cx+20,sy-34);ctx.globalAlpha=1;
    }
  },
  {
    id:'snap',
    label:'WRIST SNAP',
    color:'#00C8FF',
    tagline:'The topspin finisher',
    mechanic:'After palm contact, snap your wrist forward and down to put topspin on the ball. This makes it drop into the court instead of sailing out.',
    powerTip:'Think of snapping a towel — the wrist crack comes AFTER the arm swings through. The snap adds 5–15 mph of ball speed and curve.',
    mistakes:['No wrist action — flat ball floats out of bounds','Snapping too early — turns into a push shot','Stiff fingers — reduces snap velocity significantly'],
    draw:(ctx,t,col)=>{
      const W=160,H=200,gY=178,cx=72;
      ctx.clearRect(0,0,W,H);ctx.fillStyle='#08090b';ctx.fillRect(0,0,W,H);
      const v=sat(Math.sin(t*Math.PI*2)*.5+.5);
      const snap=smoothstep(v);
      const airY=gY-76, by=airY-30, sy=by-24;
      ctx.globalAlpha=.07;ctx.fillStyle='#aaa';
      ctx.beginPath();ctx.ellipse(cx,gY+2,8,2.5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      // ball trajectory arc (topspin)
      const bStartX=cx+40,bStartY=sy-30;
      const progress=snap;
      const bx=bStartX+progress*50, by2=bStartY+progress*progress*80;
      // draw trajectory guide
      ctx.globalAlpha=.2;ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([2,4]);
      ctx.beginPath();
      for(let i=0;i<=20;i++){const ti=i/20;ctx.lineTo(bStartX+ti*50,bStartY+ti*ti*80);}
      ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
      // spin indicator on ball
      if(snap>.15){
        ctx.globalAlpha=.4;ctx.strokeStyle=col;ctx.lineWidth=1.2;
        for(let i=0;i<3;i++){
          const a=-Math.PI*.4+i*.3+snap*8;
          ctx.beginPath();ctx.arc(bx-2,by2-2,5,a,a+.8);ctx.stroke();
        }
        ctx.globalAlpha=1;
      }
      drawBall(ctx,bx,by2,8,0);
      const wristSnap=snap*1.4;
      const p={
        head:{x:cx+8,y:sy-20},neck:{x:cx+5,y:sy-6},
        sho:{x:cx,y:sy},hips:{x:cx,y:by},
        kL:{x:cx-10,y:by+22},kR:{x:cx+10,y:by+20},
        fL:{x:cx-10,y:airY+18},fR:{x:cx+10,y:airY+16},
        eL:{x:cx-17,y:sy+16},
        eR:{x:cx+32,y:sy-14+snap*6},
        hL:{x:cx-13,y:sy+30},
        hR:{x:bStartX+snap*12,y:bStartY+snap*12+snap*14},
      };
      drawAthlete(ctx,p);
      // wrist angle label
      ctx.globalAlpha=.5;ctx.fillStyle=col;ctx.font='7px monospace';
      ctx.fillText('SNAP ↓',p.hR.x+4,p.hR.y+12);ctx.globalAlpha=1;
    }
  },
  {
    id:'followthrough',
    label:'FOLLOW-THROUGH',
    color:'#00FF87',
    tagline:'Let the arm finish across',
    mechanic:'After contact, your hitting arm swings all the way across your body. Stopping early kills velocity — the follow-through IS the swing.',
    powerTip:'Your hand should end up near the opposite hip after the swing. If your arm stops at the ball, you hit the brake at impact.',
    mistakes:['Arm stops at contact — braking at the worst moment','Pulling off the shot — elbow flares out early','No body rotation on follow-through — power didn\'t transfer'],
    draw:(ctx,t,col)=>{
      const W=160,H=200,gY=178,cx=72;
      ctx.clearRect(0,0,W,H);ctx.fillStyle='#08090b';ctx.fillRect(0,0,W,H);
      const v=sat(Math.sin(t*Math.PI*2)*.5+.5);
      const fol=smoothstep(v);
      const airY=gY-70, by=airY-30, sy=by-24;
      ctx.globalAlpha=.06;ctx.fillStyle='#aaa';
      ctx.beginPath();ctx.ellipse(cx,gY+2,8,2.5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      // motion trail of the arm
      ctx.globalAlpha=.15;ctx.strokeStyle=col;ctx.lineWidth=8;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(cx+18,sy+2,36,-1.8,-1.8+fol*2.2);ctx.stroke();
      ctx.globalAlpha=1;
      const swing=fol;
      const hRx=cx+36-swing*48, hRy=sy-22+swing*52;
      const p={
        head:{x:cx+10-swing*8,y:sy-20},neck:{x:cx+6-swing*4,y:sy-6},
        sho:{x:cx,y:sy},hips:{x:cx,y:by},
        kL:{x:cx-10,y:by+22},kR:{x:cx+10,y:by+22},
        fL:{x:cx-10,y:airY+16},fR:{x:cx+10,y:airY+14},
        eL:{x:cx-16,y:sy+18},
        eR:{x:cx+24-swing*18,y:sy-10+swing*28},
        hL:{x:cx-12,y:sy+32},
        hR:{x:hRx,y:hRy},
      };
      drawAthlete(ctx,p);
      // "FULL FINISH" annotation
      if(swing>.6){
        ctx.globalAlpha=(swing-.6)/.4*.5;
        ctx.fillStyle=col;ctx.font='bold 7px monospace';
        ctx.fillText('FULL FINISH',hRx-14,hRy+14);ctx.globalAlpha=1;
      }
    }
  },
];

// ─── Animated phase canvas component ──────────────────────────────
function PhaseCanvas({ phase }) {
  const ref = useRef(null), fr = useRef(0), raf = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const loop = () => {
      phase.draw(ctx, (fr.current % 180) / 180, phase.color);
      fr.current++;
      raf.current = requestAnimationFrame(loop);
    };
    fr.current = 0;
    raf.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf.current);
  }, [phase]);
  return <canvas ref={ref} width={160} height={200} style={{display:'block',borderRadius:'4px'}} />;
}

                      border:`1px solid ${ex.color}22`,
                      padding:'12px 14px',
                      margin:'0 0 14px',
                    }}>
                      <div style={{fontFamily:'monospace',fontSize:'8px',color:ex.color,letterSpacing:'2px',marginBottom:'5px'}}>⚡ WHY THIS BUILDS POWER</div>
                      <div style={{fontSize:'12px',color:'#aaa',lineHeight:1.65}}>{ex.powerKey}</div>
                    </div>

                    <div style={{fontFamily:'monospace',fontSize:'9px',color:C.muted,letterSpacing:'2px',marginBottom:'10px'}}>HOW TO DO IT</div>
                    {ex.howTo.map((step,si)=>(
                      <div key={si} style={{
                        display:'flex',gap:'12px',
                        padding:'9px 0',
                        borderBottom:si<ex.howTo.length-1?`1px solid ${C.border}`:'none',
                      }}>
                        <div style={{
                          minWidth:'22px',height:'22px',borderRadius:'50%',
                          background:`${ex.color}18`,border:`1px solid ${ex.color}44`,
                          display:'flex',alignItems:'center',justifyContent:'center',
                          fontFamily:'monospace',fontSize:'9px',fontWeight:'bold',
                          color:ex.color,flexShrink:0,marginTop:'1px',
                        }}>{si+1}</div>
                        <div>
                          <div style={{fontSize:'11px',fontWeight:'bold',color:'#ddd',marginBottom:'3px',fontFamily:'monospace',letterSpacing:'0.5px'}}>{step.step}</div>
                          <div style={{fontSize:'12px',color:'#888',lineHeight:1.65}}>{step.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── POWER CHAIN TAB ── */}
      {activeTab==='power chain' && (
        <div style={{padding:'20px'}}>
          <div style={{fontFamily:'monospace',fontSize:'9px',letterSpacing:'3px',color:C.muted,marginBottom:'16px'}}>
            THE KINETIC CHAIN — WHERE POWER COMES FROM
          </div>

          <div style={{
            background:C.dim,border:`1px solid ${C.border}`,
            padding:'16px',marginBottom:'16px',
          }}>
            <div style={{fontSize:'13px',color:'#aaa',lineHeight:1.75}}>
              A volleyball spike is not an arm exercise. Power travels upward like a crack of a whip — starting at the ground and multiplying at each joint. Break the chain anywhere and you lose velocity.
            </div>
          </div>

          {/* Chain links */}
          {[
            {num:1,name:'GROUND PUSH',muscle:'Legs & Calves',color:C.green,pct:25,desc:'Your feet push into the ground during the jump. Ground reaction force launches your entire body upward — this is where it all starts.', cue:'Drive THROUGH the floor, not just off it'},
            {num:2,name:'HIP ROTATION',muscle:'Glutes & Core',color:C.gold,pct:35,desc:'As you peak in the air, your hips rotate explosively toward the net. This rotation speeds up everything above it through angular momentum.', cue:'Hips lead the shoulder by a half-second'},
            {num:3,name:'TRUNK ROTATION',muscle:'Obliques & Lats',color:C.accent,pct:55,desc:'Your obliques and lats whip your torso through. Your chest opens toward the ball — this is the largest single power contributor in the chain.', cue:'Feel your rib cage rotate, not just your shoulder'},
            {num:4,name:'SHOULDER DRIVE',muscle:'Deltoid & Rotator Cuff',color:C.accent,pct:75,desc:'The shoulder joint transfers all the trunk rotation into linear arm speed. Your arm is passive here — it rides the rotation wave.', cue:'Elbow leads, hand trails — not the other way'},
            {num:5,name:'WRIST SNAP',muscle:'Forearm Flexors',color:C.blue,pct:100,desc:'The final amplifier. A fast wrist snap adds 5–15 mph to ball speed and creates the topspin that brings the ball down into the court.', cue:'Snap happens AFTER contact, not during'},
          ].map((link,i)=>(
            <div key={i} style={{display:'flex',gap:'16px',alignItems:'stretch',marginBottom:'3px'}}>
              {/* Timeline connector */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:'32px'}}>
                <div style={{
                  width:'32px',height:'32px',borderRadius:'50%',
                  background:`${link.color}20`,border:`2px solid ${link.color}`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:'monospace',fontSize:'12px',fontWeight:'bold',
                  color:link.color,flexShrink:0,marginTop:'14px',
                }}>{link.num}</div>
                {i<4&&<div style={{width:'2px',flex:1,background:`linear-gradient(${link.color}44,${C.border})`,marginTop:'4px'}}/>}
              </div>

              {/* Card */}
              <div style={{
                flex:1,background:C.dim,border:`1px solid ${C.border}`,
                borderLeft:`3px solid ${link.color}`,padding:'14px',
                marginBottom:'3px',
              }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
                  <div>
                    <div style={{fontFamily:'monospace',fontSize:'8px',color:link.color,letterSpacing:'2px',marginBottom:'3px'}}>{link.name}</div>
                    <div style={{fontSize:'16px',fontWeight:'bold'}}>{link.muscle}</div>
                  </div>
                  <div style={{
                    fontFamily:'monospace',fontSize:'18px',fontWeight:'bold',
                    color:link.color,
                  }}>{link.pct}%</div>
                </div>

                {/* Power accumulation bar */}
                <div style={{height:'3px',background:'#1a1d22',borderRadius:'2px',marginBottom:'10px'}}>
                  <div style={{
                    height:'100%',width:`${link.pct}%`,
                    background:`linear-gradient(90deg,${link.color}55,${link.color})`,
                    borderRadius:'2px',boxShadow:`0 0 6px ${link.color}44`,
                  }}/>
                </div>

                <div style={{fontSize:'12px',color:'#888',lineHeight:1.65,marginBottom:'10px'}}>
                  {link.desc}
                </div>

                <div style={{
                  display:'flex',gap:'8px',alignItems:'center',
                  background:`${link.color}0a`,padding:'8px 10px',
                }}>
                  <span style={{color:link.color,fontSize:'12px'}}>→</span>
                  <span style={{fontFamily:'monospace',fontSize:'10px',color:link.color,letterSpacing:'0.5px'}}>
                    {link.cue}
                  </span>
                </div>
              </div>
            </div>
          ))}

          {/* Power percentages summary */}
          <div style={{
            background:C.dim,border:`1px solid ${C.border}`,
            padding:'18px',marginTop:'8px',
          }}>
            <div style={{fontFamily:'monospace',fontSize:'9px',color:C.muted,letterSpacing:'3px',marginBottom:'14px'}}>
              POWER SOURCE BREAKDOWN
            </div>
            <PowerBar label="LEGS & JUMP" value={25} color={C.green} unit="%" />
            <PowerBar label="HIP ROTATION" value={35} color={C.gold} unit="%" />
            <PowerBar label="TRUNK / CORE" value={55} color={C.accent} unit="%" />
            <PowerBar label="SHOULDER DRIVE" value={20} color='#ff8855' unit="%" />
            <PowerBar label="WRIST SNAP" value={15} color={C.blue} unit="%" />
            <div style={{
              marginTop:'14px',padding:'12px',
              background:`${C.accent}0a`,border:`1px solid ${C.accent}22`,
            }}>
              <div style={{fontFamily:'monospace',fontSize:'9px',color:C.accent,letterSpacing:'2px',marginBottom:'6px'}}>
                THE BOTTOM LINE
              </div>
              <div style={{fontSize:'12px',color:'#888',lineHeight:1.65}}>
                Most players train their arm and ignore their hips and core. Flipping that ratio — training hip and trunk rotation first — is the fastest path to dramatically more hitting power.
              </div>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}


    // Mount both apps
    ReactDOM.createRoot(document.getElementById('root-spike')).render(<SpikePower />);
    ReactDOM.createRoot(document.getElementById('root-vert')).render(<VertPro />);
  </script>

  <script>
    function showApp(app, btn) {
      document.getElementById('root-spike').style.display = app === 'spike' ? 'block' : 'none';
      document.getElementById('root-vert').style.display  = app === 'vert'  ? 'block' : 'none';
      document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
